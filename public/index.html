<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VidSnap – YouTube & Instagram Downloader</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --card: #1c1c28;
    --border: #2a2a3d;
    --accent: #7c5cff;
    --text: #f0f0ff;
    --muted: #6b6b8a;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
  }
  body::before {
    content:'';
    position:fixed;
    inset:0;
    background-image: linear-gradient(rgba(124,92,255,0.03) 1px,transparent 1px), linear-gradient(90deg,rgba(124,92,255,0.03) 1px,transparent 1px);
    background-size:40px 40px;
    pointer-events:none;
    z-index:0;
  }
  .wrapper { position:relative; z-index:1; max-width:720px; margin:0 auto; padding:50px 20px 80px; }

  header { text-align:center; margin-bottom:44px; animation:fadeDown .6s ease both; }
  .logo { font-family:'Bebas Neue',sans-serif; font-size:clamp(50px,10vw,82px); letter-spacing:4px; background:linear-gradient(135deg,#ff0000 0%,#7c5cff 50%,#E1306C 100%); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; line-height:1; }
  .tagline { color:var(--muted); font-size:13px; letter-spacing:2px; text-transform:uppercase; margin-top:8px; }
  .platforms { display:flex; justify-content:center; gap:10px; margin-top:16px; }
  .badge { display:flex; align-items:center; gap:6px; padding:5px 14px; border-radius:100px; font-size:12px; font-weight:500; border:1px solid; }
  .badge.yt { border-color:rgba(255,0,0,.3); color:#ff6b6b; background:rgba(255,0,0,.06); }
  .badge.ig { border-color:rgba(225,48,108,.3); color:#f78fb3; background:rgba(225,48,108,.06); }
  .badge svg { width:13px; height:13px; }

  /* API Config */
  .config-bar {
    background: rgba(124,92,255,0.08);
    border: 1px solid rgba(124,92,255,0.2);
    border-radius: 12px;
    padding: 14px 16px;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 10px;
    animation: fadeUp .5s ease both;
  }
  .config-bar label { font-size:12px; color:var(--muted); white-space:nowrap; }
  .config-bar input {
    flex:1; background:var(--surface); border:1px solid var(--border); border-radius:8px;
    padding:8px 12px; color:var(--text); font-family:'DM Sans',sans-serif; font-size:13px; outline:none;
  }
  .config-bar input:focus { border-color:var(--accent); }
  .config-bar input::placeholder { color:var(--muted); }
  .save-btn {
    padding:8px 14px; background:var(--accent); color:#fff; border:none; border-radius:8px;
    font-family:'DM Sans',sans-serif; font-size:13px; font-weight:600; cursor:pointer; white-space:nowrap;
    transition:filter .2s;
  }
  .save-btn:hover { filter:brightness(1.2); }

  .card { background:var(--card); border:1px solid var(--border); border-radius:20px; padding:28px; animation:fadeUp .6s .1s ease both; box-shadow:0 24px 64px rgba(0,0,0,.4); }

  .tabs { display:flex; background:var(--surface); border-radius:12px; padding:4px; margin-bottom:24px; gap:4px; }
  .tab { flex:1; display:flex; align-items:center; justify-content:center; gap:7px; padding:10px; border-radius:9px; border:none; cursor:pointer; font-family:'DM Sans',sans-serif; font-size:14px; font-weight:500; transition:all .25s; color:var(--muted); background:transparent; }
  .tab svg { width:15px; height:15px; }
  .tab.active-yt { background:rgba(255,0,0,.15); color:#ff6b6b; }
  .tab.active-ig { background:rgba(225,48,108,.15); color:#f78fb3; }

  .input-group { position:relative; margin-bottom:16px; }
  .url-input { width:100%; background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:15px 46px 15px 16px; color:var(--text); font-family:'DM Sans',sans-serif; font-size:14px; outline:none; transition:border-color .2s,box-shadow .2s; }
  .url-input:focus { border-color:var(--accent); box-shadow:0 0 0 3px rgba(124,92,255,.1); }
  .url-input::placeholder { color:var(--muted); }
  .clear-btn { position:absolute; right:13px; top:50%; transform:translateY(-50%); background:none; border:none; color:var(--muted); cursor:pointer; padding:4px; display:none; transition:color .2s; }
  .clear-btn:hover { color:var(--text); }
  .clear-btn.visible { display:flex; }

  .fetch-btn { width:100%; padding:14px; border-radius:12px; border:none; cursor:pointer; font-family:'Bebas Neue',sans-serif; font-size:20px; letter-spacing:2px; transition:all .25s; }
  .fetch-btn.yt-btn { background:linear-gradient(135deg,#cc0000,#ff4444); color:#fff; box-shadow:0 8px 24px rgba(255,0,0,.25); }
  .fetch-btn.ig-btn { background:linear-gradient(135deg,#833ab4,#E1306C,#fd1d1d); color:#fff; box-shadow:0 8px 24px rgba(225,48,108,.25); }
  .fetch-btn:hover { transform:translateY(-2px); filter:brightness(1.1); }
  .fetch-btn:disabled { opacity:.6; cursor:not-allowed; transform:none; }

  .loader { display:none; flex-direction:column; align-items:center; gap:14px; padding:28px; text-align:center; }
  .spinner { width:38px; height:38px; border:3px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin .8s linear infinite; }
  .loader p { color:var(--muted); font-size:14px; }

  .error-box { display:none; margin-top:16px; padding:14px; background:rgba(239,68,68,.08); border:1px solid rgba(239,68,68,.2); border-radius:12px; color:#fca5a5; font-size:13px; text-align:center; animation:fadeUp .3s ease both; }

  .result { display:none; margin-top:20px; background:var(--surface); border:1px solid var(--border); border-radius:14px; overflow:hidden; animation:fadeUp .4s ease both; }
  .result-thumb { width:100%; aspect-ratio:16/9; object-fit:cover; display:block; background:var(--card); }
  .result-info { padding:18px; }
  .result-title { font-weight:600; font-size:15px; line-height:1.4; margin-bottom:10px; }
  .result-meta { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:16px; }
  .meta-chip { display:flex; align-items:center; gap:4px; font-size:12px; color:var(--muted); background:var(--card); padding:4px 10px; border-radius:100px; border:1px solid var(--border); }
  .quality-label { font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:1px; margin-bottom:10px; }
  .quality-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(88px,1fr)); gap:8px; margin-bottom:16px; }
  .q-btn { padding:10px 6px; border-radius:9px; border:1px solid var(--border); background:var(--card); color:var(--muted); cursor:pointer; font-family:'DM Sans',sans-serif; font-size:13px; font-weight:500; text-align:center; transition:all .2s; }
  .q-btn:hover { border-color:var(--accent); color:var(--text); }
  .q-btn.selected { border-color:var(--accent); background:rgba(124,92,255,.15); color:var(--accent); }
  .q-btn small { display:block; font-size:10px; opacity:.6; margin-top:2px; }
  .dl-btn { width:100%; padding:14px; border-radius:11px; border:none; cursor:pointer; font-family:'Bebas Neue',sans-serif; font-size:18px; letter-spacing:2px; background:linear-gradient(135deg,var(--accent),#a78bfa); color:#fff; box-shadow:0 8px 24px rgba(124,92,255,.3); transition:all .25s; display:flex; align-items:center; justify-content:center; gap:8px; }
  .dl-btn:hover { transform:translateY(-2px); filter:brightness(1.1); }
  .dl-btn:disabled { opacity:.6; cursor:not-allowed; transform:none; }

  .notice { margin-top:24px; padding:14px; background:rgba(245,158,11,.06); border:1px solid rgba(245,158,11,.15); border-radius:12px; font-size:12px; color:rgba(245,158,11,.8); text-align:center; line-height:1.6; animation:fadeUp .6s .2s ease both; }

  @keyframes fadeDown { from{opacity:0;transform:translateY(-20px)} to{opacity:1;transform:none} }
  @keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:none} }
  @keyframes spin { to{transform:rotate(360deg)} }

  @media(max-width:480px) { .card{padding:18px;} .quality-grid{grid-template-columns:repeat(3,1fr);} }
</style>
</head>
<body>
<div class="wrapper">

  <header>
    <div class="logo">VidSnap</div>
    <div class="tagline">YouTube & Instagram Downloader</div>
    <div class="platforms">
      <span class="badge yt">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M23.5 6.5a3 3 0 00-2.1-2.1C19.5 4 12 4 12 4s-7.5 0-9.4.4A3 3 0 00.5 6.5C0 8.4 0 12 0 12s0 3.6.5 5.5a3 3 0 002.1 2.1C4.5 20 12 20 12 20s7.5 0 9.4-.4a3 3 0 002.1-2.1C24 15.6 24 12 24 12s0-3.6-.5-5.5zM9.75 15.5v-7l6.5 3.5-6.5 3.5z"/></svg>
        YouTube
      </span>
      <span class="badge ig">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163c0-3.403-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z"/></svg>
        Instagram Reels
      </span>
    </div>
  </header>

  <!-- API URL Config -->
  <div class="config-bar">
    <label>🔗 API URL:</label>
    <input type="text" id="apiUrl" placeholder="https://your-app.railway.app" />
    <button class="save-btn" onclick="saveApi()">Save</button>
  </div>

  <div class="card">
    <div class="tabs">
      <button class="tab active-yt" id="tab-yt" onclick="switchTab('yt')">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M23.5 6.5a3 3 0 00-2.1-2.1C19.5 4 12 4 12 4s-7.5 0-9.4.4A3 3 0 00.5 6.5C0 8.4 0 12 0 12s0 3.6.5 5.5a3 3 0 002.1 2.1C4.5 20 12 20 12 20s7.5 0 9.4-.4a3 3 0 002.1-2.1C24 15.6 24 12 24 12s0-3.6-.5-5.5zM9.75 15.5v-7l6.5 3.5-6.5 3.5z"/></svg>
        YouTube
      </button>
      <button class="tab" id="tab-ig" onclick="switchTab('ig')">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163c0-3.403-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z"/></svg>
        Instagram Reels
      </button>
    </div>

    <div class="input-group">
      <input class="url-input" id="urlInput" type="text" placeholder="YouTube link yahan paste karo..." oninput="handleInput(this)" />
      <button class="clear-btn" id="clearBtn" onclick="clearInput()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>

    <button class="fetch-btn yt-btn" id="fetchBtn" onclick="fetchVideo()">VIDEO INFO FETCH KARO</button>

    <div class="loader" id="loader">
      <div class="spinner"></div>
      <p id="loaderText">Video info fetch ho rahi hai...</p>
    </div>

    <div class="error-box" id="errorBox"></div>

    <div class="result" id="result">
      <img class="result-thumb" id="thumb" src="" alt="thumbnail" onerror="this.style.display='none'" />
      <div class="result-info">
        <div class="result-title" id="videoTitle">–</div>
        <div class="result-meta" id="metaChips"></div>
        <div class="quality-label">Quality Chuno</div>
        <div class="quality-grid" id="qualityGrid"></div>
        <button class="dl-btn" id="dlBtn" onclick="downloadVideo()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          DOWNLOAD KARO
        </button>
      </div>
    </div>
  </div>

  <div class="notice">
    ℹ️ Pehle Railway pe backend deploy karo, phir uska URL upar dale. Sirf apne personal use ke liye use karo.
  </div>

</div>

<script>
  let currentTab = 'yt';
  let selectedFormatId = null;
  let API_URL = localStorage.getItem('vidsnap_api') || '';

  // Load saved API URL
  if (API_URL) document.getElementById('apiUrl').value = API_URL;

  function saveApi() {
    API_URL = document.getElementById('apiUrl').value.trim().replace(/\/$/, '');
    localStorage.setItem('vidsnap_api', API_URL);
    alert('✅ API URL save ho gayi: ' + API_URL);
  }

  function switchTab(tab) {
    currentTab = tab;
    document.getElementById('tab-yt').className = 'tab';
    document.getElementById('tab-ig').className = 'tab';
    const fetchBtn = document.getElementById('fetchBtn');
    const input = document.getElementById('urlInput');

    if (tab === 'yt') {
      document.getElementById('tab-yt').classList.add('active-yt');
      fetchBtn.className = 'fetch-btn yt-btn';
      input.placeholder = 'YouTube link yahan paste karo...';
    } else {
      document.getElementById('tab-ig').classList.add('active-ig');
      fetchBtn.className = 'fetch-btn ig-btn';
      input.placeholder = 'Instagram Reel link yahan paste karo...';
    }
    document.getElementById('result').style.display = 'none';
    document.getElementById('errorBox').style.display = 'none';
  }

  function handleInput(el) {
    document.getElementById('clearBtn').classList.toggle('visible', el.value.length > 0);
  }

  function clearInput() {
    document.getElementById('urlInput').value = '';
    document.getElementById('clearBtn').classList.remove('visible');
    document.getElementById('result').style.display = 'none';
    document.getElementById('errorBox').style.display = 'none';
    document.getElementById('urlInput').focus();
  }

  function showError(msg) {
    const box = document.getElementById('errorBox');
    box.textContent = msg;
    box.style.display = 'block';
  }

  async function fetchVideo() {
    const url = document.getElementById('urlInput').value.trim();
    if (!url) { showError('Pehle link paste karo!'); return; }
    if (!API_URL) { showError('Pehle Railway API URL save karo upar!'); return; }

    document.getElementById('errorBox').style.display = 'none';
    document.getElementById('result').style.display = 'none';
    document.getElementById('loader').style.display = 'flex';
    document.getElementById('loaderText').textContent = 'Video info fetch ho rahi hai...';
    document.getElementById('fetchBtn').disabled = true;

    try {
      const res = await fetch(`${API_URL}/api/info`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ url })
      });
      const data = await res.json();

      if (!res.ok) throw new Error(data.error || 'Kuch gadbad ho gayi!');

      renderResult(data);
    } catch (e) {
      showError('❌ ' + (e.message || 'Server se connect nahi ho paya!'));
    } finally {
      document.getElementById('loader').style.display = 'none';
      document.getElementById('fetchBtn').disabled = false;
    }
  }

  function renderResult(data) {
    document.getElementById('thumb').src = data.thumbnail || '';
    document.getElementById('videoTitle').textContent = data.title;
    document.getElementById('metaChips').innerHTML = `
      <span class="meta-chip">🕐 ${data.duration}</span>
      <span class="meta-chip">👁 ${data.view_count}</span>
      <span class="meta-chip">📺 ${data.uploader}</span>
    `;

    const grid = document.getElementById('qualityGrid');
    grid.innerHTML = '';
    selectedFormatId = data.formats[0]?.format_id;

    data.formats.forEach((f, i) => {
      const btn = document.createElement('button');
      btn.className = 'q-btn' + (i === 0 ? ' selected' : '');
      const label = f.hasVideo ? (f.quality || 'Video') : 'Audio';
      btn.innerHTML = `${label}<small>${f.ext.toUpperCase()} • ${f.filesize}</small>`;
      btn.onclick = () => {
        document.querySelectorAll('.q-btn').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        selectedFormatId = f.format_id;
      };
      grid.appendChild(btn);
    });

    document.getElementById('result').style.display = 'block';
  }

  async function downloadVideo() {
    const url = document.getElementById('urlInput').value.trim();
    if (!url || !API_URL) return;

    const dlBtn = document.getElementById('dlBtn');
    dlBtn.disabled = true;
    dlBtn.innerHTML = `<div class="spinner" style="width:20px;height:20px;border-width:2px"></div> Downloading...`;

    try {
      const res = await fetch(`${API_URL}/api/download`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ url, format_id: selectedFormatId })
      });

      if (!res.ok) {
        const err = await res.json();
        throw new Error(err.error);
      }

      const blob = await res.blob();
      const ext = blob.type.includes('audio') ? 'mp3' : 'mp4';
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = `vidsnap_download.${ext}`;
      a.click();
      URL.revokeObjectURL(a.href);

    } catch (e) {
      showError('Download fail: ' + e.message);
    } finally {
      dlBtn.disabled = false;
      dlBtn.innerHTML = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg> DOWNLOAD KARO`;
    }
  }
</script>
</body>
</html>
